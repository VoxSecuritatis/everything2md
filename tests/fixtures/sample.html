<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sample HTML Document</title>
</head>
<body>
  <h1>Sample HTML</h1>
  <p>This is a <strong>bold</strong> paragraph with some <em>italic</em> text.</p>
  <h2>A List</h2>
  <ul>
    <li>Item one</li>
    <li>Item two</li>
    <li>Item three</li>
  </ul>
  <h2>A Table</h2>
  <table>
    <tr><th>Name</th><th>Value</th></tr>
    <tr><td>Alpha</td><td>1</td></tr>
    <tr><td>Beta</td><td>2</td></tr>
  </table>
</body>
</html>
